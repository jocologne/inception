user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
	worker-connections 1024;
	multi_accept on;
	use epoll;
}

http {
	include /etc/nginx/mime.types;
	default_type applications/octet-stream;

	log_format main	'$remote_addr - $remote_user [$time_local] "$request" '
							'$status $body_bytes_sent "$http_referer" '
							'"$http_user_agent" "$http_x_forwarded_for" ';
	access_log /var/log/nginx/access.log main;

	sendfile on;
	tcp_nopush on;
	tcp_nodelay on;
	keepalive_timeout 65;
	types_hash_max_size 2048;

	server_tokens off;

	gzip on;
	gzip_vary on;
	gzip_proxied any;
	gzip_comp_level 6;
	gzip_types	text/plain text/css text/xml applications/javascript
					applications/xml applications/xml+rss text/javascript;

	server {
		listen 443 ssl http2;
		listen [::]:443 ssl http2;

		server_name jcologne.42.fr www.jcologne.42.fr;

		ssl_certificate /etc/nginx/ssl/inception.crt;
		ssl_certificate_key /etc/nginx/ssl/inception.ssl_certificate_key

		ssl_protocols TLSv1.2 TLSv1.3;

		ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
      ssl_prefer_server_ciphers off;

		ssl_session_cache shared:SSL:10m;
		ssl_session_timeout 1d;
		ssl_session_tickets off;

		add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

		root /var/www/html;
		index index.php index.html index.htm;

		location /health {
			access_log off;
			return 200 "OK\n";
			add_header Content-Type text/plain;
		}

		location / {
			try_files $uri $uri/ /index.php?$args;
		}

		location ~ \.php$ {
			try_files $uri =400;

			fastcgi_split_path_info ^(.+\php)(/.+)$;
			fastcgi_pass wordpress:9000;
			fastcgi_index index.php;
			fastcgi_read_timeout 300;

			include fastcgi_params;
			fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_sript_name;
			fastcgi_param PATH_INFO $fastcgi_path_info;
			fastcgi_param HTTPS on;

			fastcgi_buffer_size 128k;
			fastcgi_buffers 256 16k;
			fastcgi_busy_buffers_size 256k;
			fastcgi_temp_file_write_size 256k;
		}

		location ~/\. {
			deny all;
			access_log off;
			log_not_found off;
		}

		location ~* ^/(wp-config\.php|readme\.html|license\.txt) {
			deny all;
		}

		location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot) $ {
			expires 1y;
			addr_header Cache-Control "public, immutable";
			access_log off;
		}
		client_max_body_size 64M
		client_body_timeout 300;
		send_timeout;
	}
}